<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Personalized Mobile Protocol: 50/30/14/30 */
            --os-section-h: 50px;
            --os-row-h: 30px;
            --os-body-size: 14px;
            --os-header-size: 30px;
        }

        body {
            background-color: #000;
            color: #fafafa;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: var(--os-body-size);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--os-section-h) 0;
        }

        .login-glass {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 40px 30px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header-text {
            font-size: var(--os-header-size);
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .form-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .os-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 14px;
            color: white;
            font-size: 13px;
            outline: none;
            transition: 0.3s;
        }

        .os-input:focus {
            border-color: #ffde00;
            background: rgba(255, 255, 255, 0.08);
        }

        .login-btn {
            padding: 16px;
            border-radius: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .btn-google { background: #fff; color: #000; }
        
        /* Updated Game Center Style */
        .btn-gamecenter { 
            background: #ffffff; 
            color: #1a1a1a; 
            border: 1px solid rgba(0,0,0,0.1); 
        }
        
        .btn-primary { background: #ffde00; color: #000; border: none; font-size: 11px; margin-top: 10px; }

        .login-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .login-btn:active { transform: scale(0.96); }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            text-align: center;
            opacity: 0.2;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #fff;
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .mode-switch {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
        }
        .mode-switch span { color: #ffde00; }

        .status-dot {
            width: 8px; height: 8px;
            background: #ffde00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ffde00;
        }

        .gc-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="login-glass">
        <div class="mb-6">
            <div class="header-text">WEREWOLF.OS</div>
            <div class="flex items-center justify-center opacity-50">
                <span class="status-dot"></span>
                <span class="text-[10px] font-black uppercase tracking-widest">Uplink Authorization</span>
            </div>
        </div>

        <div class="auth-container">
            <!-- OAuth Grid -->
            <div class="auth-grid">
                <!-- Google Option -->
                <button class="login-btn btn-google" onclick="appAuth.signInGoogle()">
                    <svg width="16" height="16" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.25h2.91c1.7-1.56 2.68-3.86 2.68-6.6z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.25c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.58-5.03-3.7H1.02v2.33C2.51 15.96 5.52 18 9 18z" fill="#34A853"/><path d="M3.97 10.73c-.18-.54-.28-1.11-.28-1.73s.1-1.19.28-1.73V4.94H1.02C.37 6.16 0 7.54 0 9s.37 2.84 1.02 4.06l2.95-2.33z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.52 0 2.51 2.04 1.02 4.94l2.95 2.33c.7-2.12 2.69-3.7 5.03-3.7z" fill="#EA4335"/></svg>
                    Google
                </button>

                <!-- Game Center Option (Updated Icon) -->
                <button class="login-btn btn-gamecenter" onclick="appAuth.signInGameCenter()">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7CRFvorolXg0EkoivLuUSRE-6jlhvxDskdw&s" class="gc-icon" alt="Game Center">
                    G. Center
                </button>
            </div>

            <div class="divider">OR</div>

            <!-- Email Form -->
            <div class="form-group">
                <input type="email" id="email-field" placeholder="OPERATOR EMAIL" class="os-input">
                <input type="password" id="pass-field" placeholder="PASSWORD" class="os-input">
                
                <button id="main-submit-btn" class="login-btn btn-primary" onclick="appAuth.handleEmailAuth()">
                    Authorize Access
                </button>
            </div>
            
            <div class="flex flex-col items-center">
                <div class="mode-switch" id="auth-mode-toggle" onclick="appAuth.toggleMode()">
                    New Operator? <span>Register Account</span>
                </div>
                <button onclick="appAuth.resetPassword()" class="text-[9px] uppercase font-black opacity-30 mt-4 hover:opacity-100 transition-opacity">Reset Access Key</button>
            </div>
        </div>

        <div id="status-msg" class="mt-6 text-[10px] font-bold uppercase text-red-500 hidden"></div>
        
        <div class="mt-10 pt-6 border-t border-white/5">
            <a href="../index.html" class="text-zinc-600 text-[10px] font-bold uppercase hover:text-zinc-400 transition-colors tracking-[0.2em]">Return to System Hub</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { 
            getAuth, 
            GoogleAuthProvider, 
            OAuthProvider,
            signInWithPopup, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            sendPasswordResetEmail
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        const firebaseConfig = { apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", authDomain: "angler-squad-tracker.firebaseapp.com", projectId: "angler-squad-tracker", storageBucket: "angler-squad-tracker.firebasestorage.app", messagingSenderId: "325679067980", appId: "1:325679067980:web:57edbad70fe12b988355e9" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const googleProvider = new GoogleAuthProvider();
        const gcProvider = new OAuthProvider('apple.com'); 

        let isLoginMode = true;

        function safeNavigate(target) {
            if (!target || target.trim() === '') return;
            if (window.location.protocol === 'blob:' || window.location.hostname === '') {
                console.info("WEREWOLF.OS: Success. Redirect suppressed in preview. Target:", target);
                return;
            }
            if (!window.location.pathname.includes(target)) {
                window.location.href = target;
            }
        }

        window.appAuth = {
            toggleMode: () => {
                isLoginMode = !isLoginMode;
                const btn = document.getElementById('main-submit-btn');
                const toggle = document.getElementById('auth-mode-toggle');
                btn.innerText = isLoginMode ? "Authorize Access" : "Create Registry";
                toggle.innerHTML = isLoginMode ? "New Operator? <span>Register Account</span>" : "Existing Member? <span>Sign In</span>";
            },

            signInGoogle: async () => {
                try {
                    await signInWithPopup(auth, googleProvider);
                    safeNavigate('profile.html');
                } catch (error) {
                    showError(error.code);
                }
            },

            signInGameCenter: async () => {
                try {
                    await signInWithPopup(auth, gcProvider);
                    safeNavigate('profile.html');
                } catch (error) {
                    showError("Sync Error: " + error.code);
                }
            },

            handleEmailAuth: async () => {
                const email = document.getElementById('email-field').value;
                const pass = document.getElementById('pass-field').value;
                if (!email || !pass) return showError("Credentials Required");

                try {
                    if (isLoginMode) {
                        await signInWithEmailAndPassword(auth, email, pass);
                    } else {
                        await createUserWithEmailAndPassword(auth, email, pass);
                    }
                    safeNavigate('profile.html');
                } catch (error) {
                    showError(error.code);
                }
            },

            resetPassword: async () => {
                const email = document.getElementById('email-field').value;
                if(!email) return showError("Enter email first");
                try {
                    await sendPasswordResetEmail(auth, email);
                    showError("Reset link transmitted to inbox");
                } catch (error) {
                    showError(error.code);
                }
            }
        };

        function showError(msg) {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
