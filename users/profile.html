<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Operator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <style>
        :root {
            /* Personalized Mobile Protocol: 50/30/14/30 */
            --os-section-h: 50px;
            --os-row-h: 30px;
            --os-body-size: 14px;
            --os-header-size: 30px;
            --os-nav-h: 60px;
            
            --accent: #22c55e;
            --surface: #0f172a; 
            --hunter-orange: #ff8800;
            --fs-green: #367c2b;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: var(--os-body-size);
            overflow-x: hidden;
        }

        /* --- THE BOUNCE PROTECTOR --- */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #profile-wrapper {
            position: relative;
            min-height: 100vh;
            background: radial-gradient(circle at top, #064e3b, #000);
            padding-top: calc(var(--os-nav-h) + 10px);
            padding-bottom: var(--os-section-h);
            display: none; 
        }

        .glass-panel {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 20px;
            margin-bottom: var(--os-row-h);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .header-text { font-size: var(--os-header-size); font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -0.05em; }
        .profile-avatar { width: 70px; height: 70px; border-radius: 1.5rem; border: 3px solid var(--accent); object-fit: cover; background: #000; }

        /* --- DRAWER UI --- */
        #customize-drawer {
            position: fixed; right: -400px; top: 0; bottom: 0;
            width: 90%; max-width: 350px; background: #020617;
            z-index: 100000; border-left: 2px solid var(--accent);
            transition: right 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 30px; overflow-y: auto;
            display: flex; flex-direction: column;
        }
        #customize-drawer.active { right: 0; }

        .form-label { font-size: 10px; font-weight: 900; text-transform: uppercase; opacity: 0.5; margin-bottom: 6px; display: block; }
        .form-input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 12px; color: white; font-size: 12px; margin-bottom: 15px; 
        }

        /* Stats Widgets */
        .rank-pill { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .v-bar-bg { background: rgba(0, 0, 0, 0.5); height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .v-bar-fill { height: 100%; width: 0%; transition: width 1s ease; }
        
        .trophy-slot { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 10px; margin-bottom: 4px; border-right: 3px solid var(--accent); }
        .hidden-section { display: none !important; }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 text-[10px] font-black uppercase tracking-[0.5em] text-accent animate-pulse">Syncing Operator Profile...</p>
</div>

<div id="customize-drawer">
    <div class="flex justify-between items-center mb-8">
        <h3 class="text-xl font-black italic uppercase text-accent">Operator Mods</h3>
        <button onclick="document.getElementById('customize-drawer').classList.remove('active')" class="text-white opacity-40 hover:opacity-100 font-bold text-2xl">✕</button>
    </div>
    <div class="flex-grow">
        <label class="form-label">Hub Identity (Gamertag)</label>
        <input id="hub-id-input" type="text" placeholder="e.g. Werewolf3788" class="form-input">

        <label class="form-label">Twitch Name</label>
        <input id="twitch-input" type="text" placeholder="e.g. werewolf3788" class="form-input">

        <label class="form-label">Background URL</label>
        <input id="bg-input" type="text" placeholder="https://..." class="form-input">

        <label class="form-label">Intel Bio</label>
        <textarea id="bio-input" class="form-input h-24" placeholder="Update status..."></textarea>

        <!-- THE SUBMIT BUTTON -->
        <button id="save-custom-btn" class="w-full bg-accent text-black py-4 rounded-2xl font-black uppercase text-xs italic tracking-widest hover:brightness-110 transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)]">Save & Update Registry</button>
    </div>
    <button onclick="window.appOperator.logout()" class="mt-8 w-full py-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-500 text-[10px] font-black uppercase tracking-widest italic">Terminate Session</button>
</div>

<div id="profile-wrapper">
    <main class="container mx-auto px-4 max-w-4xl">
        
        <!-- IDENTITY -->
        <div class="glass-panel flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
            <img id="user-photo" src="" class="profile-avatar">
            <div class="flex-grow">
                <div class="flex items-center justify-center md:justify-start gap-2 mb-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.4em] text-accent opacity-60">Verified: <span id="auth-id-tag">...</span></span>
                </div>
                <h1 id="user-name" class="header-text text-white">Operator</h1>
                <p id="user-status" class="text-zinc-400 text-xs italic mt-2 italic">Hub Session Active</p>
                <div class="mt-4 flex gap-2 justify-center md:justify-start">
                    <button onclick="document.getElementById('customize-drawer').classList.add('active')" class="bg-accent/10 border border-accent/20 text-accent px-4 py-2 rounded-full text-[9px] font-black uppercase">Customize</button>
                    <a href="../index.html" class="bg-white/5 border border-white/10 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Home Hub</a>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- GAME MASTERY -->
            <div class="glass-panel">
                <h2 class="text-[10px] font-black uppercase tracking-[0.3em] mb-4 text-zinc-500">Mastery Sync</h2>
                <div class="grid grid-cols-5 gap-2 text-[10px] font-black mb-6">
                    <div class="rank-pill">👑<span id="rank-greatone">0</span></div>
                    <div class="rank-pill">💎<span id="rank-diamond">0</span></div>
                    <div class="rank-pill">🥇<span id="rank-gold">0</span></div>
                    <div class="rank-pill">🥈<span id="rank-silver">0</span></div>
                    <div class="rank-pill">🥉<span id="rank-bronze">0</span></div>
                </div>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between items-end mb-1"><span class="text-[8px] font-black uppercase text-orange-500">COTW Master</span><span id="cotw-pct" class="text-[10px] font-black">0%</span></div>
                        <div class="v-bar-bg h-1.5"><div id="cotw-bar" class="v-bar-fill bg-orange-500"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-1"><span class="text-[8px] font-black uppercase text-green-500">FS25 Registry</span><span id="fs25-pct" class="text-[10px] font-black">0%</span></div>
                        <div class="v-bar-bg h-1.5"><div id="fs25-bar" class="v-bar-fill bg-green-600"></div></div>
                    </div>
                </div>
            </div>

            <!-- ANGLER -->
            <div class="glass-panel">
                <h2 class="text-[10px] font-black uppercase tracking-[0.3em] mb-4 text-zinc-500">The Angler Progress</h2>
                <div id="angler-trophy-list" class="space-y-1"></div>
            </div>
        </div>

        <!-- TWITCH -->
        <div id="twitch-section" class="glass-panel p-0 overflow-hidden hidden-section">
            <div id="twitch-embed" class="w-full aspect-video bg-black"></div>
        </div>

    </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

(function() {
    const firebaseConfig = { apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", authDomain: "angler-squad-tracker.firebaseapp.com", projectId: "angler-squad-tracker", storageBucket: "angler-squad-tracker.firebasestorage.app", messagingSenderId: "325679067980", appId: "1:325679067980:web:57edbad70fe12b988355e9" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'squad-sync-prime';

    setPersistence(auth, browserLocalPersistence);

    let currentUser = null;
    let twitchPlayer = null;

    function safeNavigate(target) {
        if (!target) return;
        if (window.location.protocol === 'blob:') return;
        window.location.replace(target);
    }

    /**
     * DYNAMIC IDENTITY RESOLUTION
     * Priority: 1. Custom Hub ID (Saved) 2. Hardcoded Elite Mappings 3. Login Display Name
     */
    function resolveHubId(user, customId) {
        if (customId) return customId;
        const e = user.email ? user.email.toLowerCase() : "";
        if (e === 'raykevin71888@gmail.com') return 'Werewolf3788';
        if (e === 'cartnalray9@gmail.com') return 'Raymystyro';
        return user.displayName || "Operator";
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            
            // Initial UI reveal
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('profile-wrapper').style.display = 'block';
            document.getElementById('user-name').innerText = user.displayName || "Operator";
            document.getElementById('user-photo').src = user.photoURL || `https://ui-avatars.com/api/?name=O&background=random`;

            // Load Custom User Config (This is the "Brain" of the profile)
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), (snap) => {
                const c = snap.exists() ? (snap.data().config || {}) : {};
                
                // Determine Hub identity (What name are we tracking?)
                const hubId = resolveHubId(user, c.hubId);
                document.getElementById('auth-id-tag').innerText = hubId;

                // Apply Visuals
                if (c.bg) document.getElementById('profile-wrapper').style.background = `url('${c.bg}') no-repeat center fixed`;
                if (c.bio) document.getElementById('user-status').innerText = c.bio;
                
                // Twitch Sync
                if (c.twitch || user.email === 'raykevin71888@gmail.com') {
                    const twChannel = c.twitch || 'werewolf3788';
                    document.getElementById('twitch-section').classList.remove('hidden-section');
                    if (!twitchPlayer) {
                        twitchPlayer = new Twitch.Embed("twitch-embed", { width: "100%", height: "100%", channel: twChannel, parent: [window.location.hostname || "localhost"], theme: "dark" });
                    }
                }

                // Pre-fill Drawer for the user
                document.getElementById('hub-id-input').value = c.hubId || '';
                document.getElementById('bg-input').value = c.bg || '';
                document.getElementById('bio-input').value = c.bio || '';
                document.getElementById('twitch-input').value = c.twitch || '';

                // SYNC DATA BASED ON HUB ID
                syncRegistryData(hubId);
            });

        } else {
            setTimeout(() => { if (!auth.currentUser) safeNavigate('login.html'); }, 2000);
        }
    });

    function syncRegistryData(hId) {
        if (!hId) return;

        // COTW Trophies
        onSnapshot(doc(db, 'artifacts', 'cotw-trophy-display', 'public', 'data', 'userTrophies', hId), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                ['bronze','silver','gold','diamond','greatone'].forEach(t => { 
                    const el = document.getElementById(`rank-${t}`);
                    if(el) el.innerText = d[t] || 0; 
                });
            }
        });

        // Master Progress
        onSnapshot(doc(db, 'artifacts', 'cotw-master', 'public', 'data', 'userTrophies', hId), (snap) => {
            if(snap.exists()){
                const trophies = snap.data().trophies || [];
                const met = trophies.filter(t => t.current >= t.goal).length;
                const pct = Math.round((met / trophies.length) * 100) || 0;
                document.getElementById('cotw-pct').innerText = pct + '%';
                document.getElementById('cotw-bar').style.width = pct + '%';
            }
        });

        // FS25 Progress
        onSnapshot(doc(db, 'artifacts', 'fs25-master', 'public', 'data', 'userTrophies', hId), (snap) => {
            if(snap.exists()){
                const t = Object.values(snap.data().PS5 || {});
                const earned = t.filter(x => x.isEarned).length;
                const pct = Math.round((earned / 46) * 100) || 0;
                document.getElementById('fs25-pct').innerText = pct + '%';
                document.getElementById('fs25-bar').style.width = pct + '%';
            }
        });

        // The Angler
        onSnapshot(doc(db, 'artifacts', 'theangler-trophy-display', 'public', 'data', 'userTrophies', hId), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                const tiers = [{k:'legendary', l:'LGD', c:'text-purple-400'}, {k:'diamond', l:'DIA', c:'text-cyan-400'}, {k:'gold', l:'GLD', c:'text-yellow-400'}];
                document.getElementById('angler-trophy-list').innerHTML = tiers.map(t => `<div class="trophy-slot"><span class="${t.c}">${t.l}</span><span>${d[t.k] || 0}</span></div>`).join('');
            }
        });
    }

    window.appOperator = {
        logout: () => signOut(auth).then(() => safeNavigate('login.html')),
        saveConfig: async () => {
            if (!currentUser) return;
            const config = { 
                hubId: document.getElementById('hub-id-input').value,
                bg: document.getElementById('bg-input').value, 
                bio: document.getElementById('bio-input').value,
                twitch: document.getElementById('twitch-input').value
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid), { config }, { merge: true });
            document.getElementById('customize-drawer').classList.remove('active');
        }
    };

    document.getElementById('save-custom-btn').onclick = window.appOperator.saveConfig;

    // Nav Injection
    const navPlaceholder = document.getElementById('nav-placeholder');
    if (navPlaceholder) {
        fetch('GlobalMenu.html').then(r => r.ok ? r.text() : Promise.reject())
            .then(d => { navPlaceholder.innerHTML = d; })
            .catch(() => { navPlaceholder.innerHTML = `<div style="height:60px; background:#000; display:flex; align-items:center; padding:0 24px; font-weight:900; color:#ffde00;">WEREWOLF.OS</div>`; });
    }
})();
</script>
</body>
</html>
