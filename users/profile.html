<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Operator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Personalized Mobile Protocol: 50/30/14/30 */
            --os-section-h: 50px;
            --os-row-h: 30px;
            --os-body-size: 14px;
            --os-header-size: 30px;
            --os-nav-h: 60px;
            
            --accent: #22c55e;
            --surface: #0f172a; 
            --hunter-orange: #ff8800;
            --fs-green: #367c2b;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: var(--os-body-size);
            overflow-x: hidden;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #profile-wrapper {
            position: relative;
            min-height: 100vh;
            background: radial-gradient(circle at top, #064e3b, #000);
            padding-top: calc(var(--os-nav-h) + 10px);
            padding-bottom: var(--os-section-h);
            display: none; 
        }

        .glass-panel {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 20px;
            margin-bottom: var(--os-row-h);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .header-text { font-size: var(--os-header-size); font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -0.05em; }
        .profile-avatar { width: 70px; height: 70px; border-radius: 1.5rem; border: 3px solid var(--accent); object-fit: cover; background: #000; }

        /* Editing Controls */
        .stat-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.2rem;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-adj {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 18px; color: white;
            transition: 0.2s;
        }
        .btn-adj:active { transform: scale(0.9); background: var(--accent); color: black; }

        .v-bar-bg { background: rgba(0, 0, 0, 0.5); height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .v-bar-fill { height: 100%; width: 0%; transition: width 1s ease; }
        
        .hidden-section { display: none !important; }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
    <p id="status-text" class="mt-4 text-[10px] font-black uppercase tracking-[0.5em] text-accent animate-pulse">Establishing Session...</p>
</div>

<div id="profile-wrapper">
    <main class="container mx-auto px-4 max-w-4xl">
        
        <!-- IDENTITY & QUICK ACTIONS -->
        <div class="glass-panel flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
            <img id="user-photo" src="" class="profile-avatar">
            <div class="flex-grow">
                <div class="flex items-center justify-center md:justify-start gap-2 mb-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.4em] text-accent opacity-60">Identity Verified</span>
                </div>
                <h1 id="user-name" class="header-text text-white">Operator</h1>
                <div class="mt-4 flex gap-2 justify-center md:justify-start">
                    <a href="../index.html" class="bg-white/5 border border-white/10 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Home Hub</a>
                    <button onclick="window.appOperator.logout()" class="bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-2 rounded-full text-[9px] font-black uppercase">Sign Out</button>
                    <!-- Special Lead Dev Link -->
                    <a id="dev-link" href="werewolf_hub.html" class="hidden bg-orange-500/20 border border-orange-500/40 text-orange-500 px-4 py-2 rounded-full text-[9px] font-black uppercase">Command Center</a>
                </div>
            </div>
        </div>

        <h2 class="text-[10px] font-black uppercase tracking-[0.6em] mb-4 text-zinc-500 px-2">Master Registry Updates</h2>

        <!-- COTW REGISTRY -->
        <div class="glass-panel" style="border-left: 4px solid var(--hunter-orange)">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">theHunter Mastery</span>
                <span id="cotw-pct" class="text-xs font-black">0%</span>
            </div>
            
            <div class="grid grid-cols-1 gap-4 mb-6">
                <!-- Trophies Editor -->
                <div class="grid grid-cols-5 gap-2">
                    <div class="flex flex-col items-center">
                        <button onclick="appOperator.updateStat('cotw', 'greatone', 1)" class="btn-adj">+</button>
                        <span class="text-[10px] mt-1">👑</span>
                        <span id="stat-greatone" class="font-black text-xs">0</span>
                        <button onclick="appOperator.updateStat('cotw', 'greatone', -1)" class="btn-adj mt-1">-</button>
                    </div>
                    <div class="flex flex-col items-center">
                        <button onclick="appOperator.updateStat('cotw', 'diamond', 1)" class="btn-adj">+</button>
                        <span class="text-[10px] mt-1">💎</span>
                        <span id="stat-diamond" class="font-black text-xs">0</span>
                        <button onclick="appOperator.updateStat('cotw', 'diamond', -1)" class="btn-adj mt-1">-</button>
                    </div>
                    <div class="flex flex-col items-center">
                        <button onclick="appOperator.updateStat('cotw', 'gold', 1)" class="btn-adj">+</button>
                        <span class="text-[10px] mt-1">🥇</span>
                        <span id="stat-gold" class="font-black text-xs">0</span>
                        <button onclick="appOperator.updateStat('cotw', 'gold', -1)" class="btn-adj mt-1">-</button>
                    </div>
                    <div class="flex flex-col items-center">
                        <button onclick="appOperator.updateStat('cotw', 'silver', 1)" class="btn-adj">+</button>
                        <span class="text-[10px] mt-1">🥈</span>
                        <span id="stat-silver" class="font-black text-xs">0</span>
                        <button onclick="appOperator.updateStat('cotw', 'silver', -1)" class="btn-adj mt-1">-</button>
                    </div>
                    <div class="flex flex-col items-center">
                        <button onclick="appOperator.updateStat('cotw', 'bronze', 1)" class="btn-adj">+</button>
                        <span class="text-[10px] mt-1">🥉</span>
                        <span id="stat-bronze" class="font-black text-xs">0</span>
                        <button onclick="appOperator.updateStat('cotw', 'bronze', -1)" class="btn-adj mt-1">-</button>
                    </div>
                </div>
            </div>
            <div class="v-bar-bg h-1.5"><div id="cotw-bar" class="v-bar-fill bg-orange-500"></div></div>
        </div>

        <!-- FS25 REGISTRY -->
        <div class="glass-panel" style="border-left: 4px solid var(--fs-green)">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black uppercase tracking-widest text-green-500">FS25 Mastery</span>
                <span id="fs25-pct" class="text-xs font-black text-green-500">0%</span>
            </div>
            
            <div class="flex items-center justify-between bg-black/30 p-4 rounded-2xl mb-4">
                <div>
                    <span class="text-[8px] font-black uppercase opacity-40">Earned PS5 Trophies</span>
                    <h3 class="text-xl font-black italic"><span id="fs25-earned">0</span> / 46</h3>
                </div>
                <div class="flex gap-2">
                    <button onclick="appOperator.updateFS25(-1)" class="btn-adj">-</button>
                    <button onclick="appOperator.updateFS25(1)" class="btn-adj">+</button>
                </div>
            </div>
            <div class="v-bar-bg h-1.5"><div id="fs25-bar" class="v-bar-fill bg-green-600"></div></div>
        </div>

    </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

(function() {
    const firebaseConfig = { apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", authDomain: "angler-squad-tracker.firebaseapp.com", projectId: "angler-squad-tracker", storageBucket: "angler-squad-tracker.firebasestorage.app", messagingSenderId: "325679067980", appId: "1:325679067980:web:57edbad70fe12b988355e9" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    setPersistence(auth, browserLocalPersistence);

    let currentUser = null;
    let hunterId = null;

    /**
     * UNIVERSAL IDENTITY MAPPING
     * Automatically uses Display Name for everyone.
     */
    function resolveIdentity(user) {
        if (!user) return null;
        const e = user.email ? user.email.toLowerCase() : "";
        if (e === 'raykevin71888@gmail.com') return 'Werewolf3788';
        if (e === 'cartnalray9@gmail.com') return 'Raymystyro';
        return user.displayName || user.uid.substring(0, 8);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            hunterId = resolveIdentity(user);
            
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('profile-wrapper').style.display = 'block';
            document.getElementById('user-name').innerText = user.displayName || "Operator";
            document.getElementById('user-photo').src = user.photoURL || `https://ui-avatars.com/api/?name=O&background=random`;

            if (user.email === 'raykevin71888@gmail.com') {
                document.getElementById('dev-link').classList.remove('hidden');
            }

            // --- AUTO SYNC DATA ---
            
            // COTW Trophies
            onSnapshot(doc(db, 'artifacts', 'cotw-trophy-display', 'public', 'data', 'userTrophies', hunterId), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    ['bronze','silver','gold','diamond','greatone'].forEach(t => { 
                        const el = document.getElementById(`stat-${t}`);
                        if(el) el.innerText = d[t] || 0; 
                    });
                }
            });

            // COTW Progress
            onSnapshot(doc(db, 'artifacts', 'cotw-master', 'public', 'data', 'userTrophies', hunterId), (snap) => {
                if(snap.exists()){
                    const trophies = snap.data().trophies || [];
                    const met = trophies.filter(t => t.current >= t.goal).length;
                    const pct = trophies.length > 0 ? Math.round((met / trophies.length) * 100) : 0;
                    document.getElementById('cotw-pct').innerText = pct + '%';
                    document.getElementById('cotw-bar').style.width = pct + '%';
                }
            });

            // FS25 Progress (Simplistic editing for users)
            onSnapshot(doc(db, 'artifacts', 'fs25-master', 'public', 'data', 'userTrophies', hunterId), (snap) => {
                if(snap.exists()){
                    const ps5Data = snap.data().PS5 || {};
                    const trophies = Object.values(ps5Data);
                    const earned = trophies.filter(t => t.isEarned).length;
                    const pct = Math.round((earned / 46) * 100) || 0;
                    document.getElementById('fs25-earned').innerText = earned;
                    document.getElementById('fs25-pct').innerText = pct + '%';
                    document.getElementById('fs25-bar').style.width = pct + '%';
                }
            });

        } else {
            setTimeout(() => { if (!auth.currentUser) window.location.replace('login.html'); }, 2000);
        }
    });

    window.appOperator = {
        logout: () => signOut(auth).then(() => window.location.replace('login.html')),
        
        // SIMPLE EDITING LOGIC FOR COTW
        updateStat: async (game, tier, delta) => {
            if (!hunterId) return;
            const ref = doc(db, 'artifacts', 'cotw-trophy-display', 'public', 'data', 'userTrophies', hunterId);
            const el = document.getElementById(`stat-${tier}`);
            const currentVal = parseInt(el.innerText) || 0;
            const newVal = Math.max(0, currentVal + delta);
            
            const update = {};
            update[tier] = newVal;
            await setDoc(ref, update, { merge: true });
        },

        // SIMPLE EDITING LOGIC FOR FS25
        updateFS25: async (delta) => {
            if (!hunterId) return;
            const ref = doc(db, 'artifacts', 'fs25-master', 'public', 'data', 'userTrophies', hunterId);
            // This logic updates the 'PS5' map by setting trophy states chronologically
            // To keep it simple for non-coders, we just mark the next available ID as earned or not
            const currentEarned = parseInt(document.getElementById('fs25-earned').innerText) || 0;
            const targetCount = Math.max(0, Math.min(46, currentEarned + delta));
            
            const ps5Update = {};
            for(let i=1; i<=46; i++) {
                ps5Update[`trophy_${i}`] = { isEarned: i <= targetCount };
            }
            await setDoc(ref, { PS5: ps5Update }, { merge: true });
        }
    };
})();
</script>
</body>
</html>
