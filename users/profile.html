<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | System Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Personalized 50/30/14/30 Protocol */
            --os-section-h: 50px; 
            --os-row-h: 30px; 
            --os-body-size: 14px; 
            --os-header-size: 30px;
            --accent: #ffde00;
        }
        body, html {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: ui-sans-serif, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }
        .router-ui { text-align: center; }
        .orbit {
            width: 60px; height: 60px; border: 3px solid rgba(255, 222, 0, 0.1);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 222, 0, 0.2);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg { 
            font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.5em; color: var(--accent); 
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="router-ui">
    <div class="orbit"></div>
    <p id="router-msg" class="msg">Establishing Uplink...</p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

(function() {
    const firebaseConfig = { 
        apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", 
        authDomain: "angler-squad-tracker.firebaseapp.com", 
        projectId: "angler-squad-tracker", 
        storageBucket: "angler-squad-tracker.firebasestorage.app", 
        messagingSenderId: "325679067980", 
        appId: "1:325679067980:web:57edbad70fe12b988355e9" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Hard-lock session for mobile persistence
    setPersistence(auth, browserLocalPersistence);

    /**
     * MASTER COMMAND ROUTER
     * Checks email identity FIRST. Forces redirect to custom hub or generic index.
     */
    onAuthStateChanged(auth, (user) => {
        const msg = document.getElementById('router-msg');
        
        if (user) {
            const email = user.email ? user.email.toLowerCase() : "";
            
            // 1. LEAD DEV (WEREWOLF3788) - HIGHEST PRIORITY
            if (email === 'raykevin71888@gmail.com') {
                msg.innerText = "Lead Dev Identity Confirmed. Loading Master Hub...";
                // location.replace wipes the history so hitting "back" doesn't loop you
                setTimeout(() => window.location.replace('werewolf_hub.html'), 500);
                return;
            } 
            
            // 2. OPERATOR RAY (RAYMYSTYRO)
            if (email === 'cartnalray9@gmail.com') {
                msg.innerText = "Raymystyro Identity Confirmed. Loading Sync Hub...";
                setTimeout(() => window.location.replace('raymystyro_hub.html'), 500);
                return;
            }

            // 3. TJ / SQUAD
            if (['henchman37@gmail.com', 'bowman4201986@gmail.com'].includes(email)) {
                msg.innerText = "Squad Member Confirmed. Loading Master Tracker...";
                setTimeout(() => window.location.replace('../thehunter_master.html'), 700);
                return;
            }

            // 4. GUEST FALLBACK
            msg.innerText = "Session Active. Routing to System Hub...";
            setTimeout(() => window.location.replace('../index.html'), 800);

        } else {
            // BOUNCE PROTECTION: Wait for Firebase Handshake
            setTimeout(() => {
                if (!auth.currentUser) {
                    msg.innerText = "No Session. Loading Login Terminal...";
                    // Prevent loops in preview mode
                    if (window.location.protocol !== 'blob:') {
                        window.location.replace('login.html');
                    }
                }
            }, 2500);
        }
    });
})();
</script>
</body>
</html>
