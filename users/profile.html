<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Profile Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Personalized Layout Settings: 50/30/14/30 */
            --os-section-h: 50px;
            --os-row-h: 30px;
            --os-body-size: 14px;
            --os-header-size: 30px;
            --os-nav-h: 60px;
            --accent: #22c55e;
            --surface: #0f172a; 
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: var(--os-body-size);
            overflow-x: hidden;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #profile-wrapper {
            position: relative;
            min-height: 100vh;
            background: radial-gradient(circle at top, #064e3b, #000);
            padding-top: calc(var(--os-nav-h) + 20px);
            padding-bottom: var(--os-section-h);
            display: none; 
        }

        .glass-panel {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 25px;
            margin-bottom: var(--os-row-h);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .header-text { font-size: var(--os-header-size); font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -0.05em; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 2rem; border: 3px solid var(--accent); object-fit: cover; background: #000; }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div id="loading-screen">
    <div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
    <p id="status-text" class="mt-4 text-[10px] font-black uppercase tracking-[0.5em] text-accent animate-pulse">Establishing Session Link...</p>
</div>

<div id="profile-wrapper">
    <main class="container mx-auto px-4 max-w-4xl">
        <div class="glass-panel flex flex-col md:flex-row items-center gap-8 text-center md:text-left">
            <img id="user-photo" src="" class="profile-avatar">
            <div class="flex-grow">
                <div class="flex items-center justify-center md:justify-start gap-2 mb-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.4em] text-accent opacity-60">Authentication Verified</span>
                </div>
                <h1 id="user-name" class="header-text text-white">Operator</h1>
                <p id="user-status" class="text-zinc-400 text-xs italic mt-2">"Waiting for operator briefing..."</p>
                <div class="mt-4 flex gap-2 justify-center md:justify-start">
                    <a href="../index.html" class="bg-white/5 border border-white/10 text-white px-6 py-2 rounded-full text-[9px] font-black uppercase">Return to Hub</a>
                </div>
            </div>
        </div>
        <p class="text-center text-[10px] opacity-20 uppercase tracking-widest mt-12">Standard Operator Clearance Level 1</p>
    </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

(function() {
    const firebaseConfig = { apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", authDomain: "angler-squad-tracker.firebaseapp.com", projectId: "angler-squad-tracker", storageBucket: "angler-squad-tracker.firebasestorage.app", messagingSenderId: "325679067980", appId: "1:325679067980:web:57edbad70fe12b988355e9" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // LEAD DEV REDIRECT
            if (user.email.toLowerCase() === 'raykevin71888@gmail.com') {
                document.getElementById('status-text').innerText = "Lead Dev Identity Confirmed. Uplinking to Command Hub...";
                setTimeout(() => {
                    if (window.location.protocol !== 'blob:') {
                        window.location.replace('werewolf_hub.html');
                    }
                }, 1000);
                return;
            }

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('profile-wrapper').style.display = 'block';
            document.getElementById('user-name').innerText = user.displayName || "Operator";
            document.getElementById('user-photo').src = user.photoURL || `https://ui-avatars.com/api/?name=O&background=random`;
        } else {
            setTimeout(() => { 
                if (!auth.currentUser && window.location.protocol !== 'blob:') {
                    window.location.replace('login.html'); 
                }
            }, 2500);
        }
    });

    // Nav
    const navPlaceholder = document.getElementById('nav-placeholder');
    if (navPlaceholder) {
        fetch('GlobalMenu.html').then(r => r.ok ? r.text() : Promise.reject())
            .then(d => { navPlaceholder.innerHTML = d; })
            .catch(() => { navPlaceholder.innerHTML = `<div style="height:60px; background:#000; display:flex; align-items:center; padding:0 24px; font-weight:900; color:#ffde00;">WEREWOLF.OS</div>`; });
    }
})();
</script>
</body>
</html>
