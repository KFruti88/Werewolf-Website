<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Profile Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --os-section-h: 50px; --os-row-h: 30px; --os-body-size: 14px; --os-header-size: 30px;
            --accent: #22c55e;
        }
        body { background: #000; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .sync-box { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="sync-box">
    <div class="spinner"></div>
    <p id="status" class="text-[10px] font-black uppercase tracking-[0.5em] text-accent animate-pulse">Establishing Session Link...</p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

(function() {
    const firebaseConfig = { apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", authDomain: "angler-squad-tracker.firebaseapp.com", projectId: "angler-squad-tracker", storageBucket: "angler-squad-tracker.firebasestorage.app", messagingSenderId: "325679067980", appId: "1:325679067980:web:57edbad70fe12b988355e9" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const email = user.email.toLowerCase();
            // LEAD DEV DIRECT UPLINK
            if (email === 'raykevin71888@gmail.com') {
                document.getElementById('status').innerText = "WEREWOLF IDENTITY VERIFIED. UPLINKING...";
                window.location.replace('werewolf_hub.html');
            } else if (email === 'cartnalray9@gmail.com') {
                window.location.replace('raymystyro_hub.html');
            } else {
                // Anyone else goes to a generic profile (or stays here)
                document.getElementById('status').innerText = "Guest Operator Link Active.";
                setTimeout(() => { window.location.replace('../index.html'); }, 1000);
            }
        } else {
            // No user found, go to login
            setTimeout(() => { if (!auth.currentUser) window.location.replace('login.html'); }, 2000);
        }
    });
})();
</script>
</body>
</html>
