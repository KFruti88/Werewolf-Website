<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Profile Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Personalized Layout Settings: 50/30/14/30 */
            --os-section-h: 50px;
            --os-row-h: 30px;
            --os-body-size: 14px;
            --os-header-size: 30px;
            --os-nav-h: 60px;
            --accent: #22c55e;
            --surface: #0f172a; 
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: var(--os-body-size);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #loading-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(34, 197, 94, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-text {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <p id="status-msg" class="status-text">Synchronizing Identity...</p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

(function() {
    const firebaseConfig = { 
        apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", 
        authDomain: "angler-squad-tracker.firebaseapp.com", 
        projectId: "angler-squad-tracker", 
        storageBucket: "angler-squad-tracker.firebasestorage.app", 
        messagingSenderId: "325679067980", 
        appId: "1:325679067980:web:57edbad70fe12b988355e9" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Ensure session is remembered
    setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, (user) => {
        const msg = document.getElementById('status-msg');
        
        if (user) {
            const email = user.email.toLowerCase();
            
            // MASTER REDIRECT LOGIC
            if (email === 'raykevin71888@gmail.com') {
                msg.innerText = "Lead Dev Verified. Uplinking to Command Hub...";
                setTimeout(() => {
                    // Force replace current history entry so "back" doesn't loop
                    window.location.replace('werewolf_hub.html');
                }, 800);
                return;
            } 
            
            if (email === 'cartnalray9@gmail.com') {
                msg.innerText = "Raymystyro Verified. Uplinking...";
                setTimeout(() => {
                    window.location.replace('raymystyro_hub.html');
                }, 800);
                return;
            }

            // Standard Users/Guests fallback
            msg.innerText = "Operator Session Active. Routing to Hub...";
            setTimeout(() => {
                window.location.replace('../index.html');
            }, 1000);

        } else {
            // No session found, send to login
            msg.innerText = "No Session Detected. Routing to Login...";
            setTimeout(() => {
                // Defensive check to avoid looping in preview
                if (window.location.protocol !== 'blob:') {
                    window.location.replace('login.html');
                }
            }, 1500);
        }
    });
})();
</script>
</body>
</html>
