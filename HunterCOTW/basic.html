        .category-title { font-size: 16px; font-weight: 900; text-transform: uppercase; font-style: italic; }

        { id: 'something', cat: 'Base Game', name: "It's Something", rank: 'bronze', current: 0, goal: 1, type: 'toggle', desc: 'Earn a bronze rating on a harvested animal.' },
        { id: 'bucket_list', cat: 'Base Game', name: 'Bucket List', rank: 'gold', current: 0, goal: 7, type: 'checklist', desc: 'Spot every unique species.', subItems: checkSet(["Moose", "Red Deer", "Roe", "Boar", "Fox", "Bison", "Fallow"]) },
        { id: 'eavesdrop', cat: 'Base Game', name: 'Eavesdropping', rank: 'silver', current: 0, goal: 1, type: 'toggle', desc: 'Identify an animal call from every species.' },
        { id: 'nerves_steel', cat: 'Base Game', name: 'Nerves of Steel', rank: 'bronze', current: 0, goal: 1, type: 'toggle', desc: 'Harvest an animal while your heart rate is elevated.' },
        { id: 'old_fashioned', cat: 'Base Game', name: 'The Old Fashioned Way', rank: 'silver', current: 0, goal: 1, type: 'toggle', desc: 'Harvest an animal using an unscoped rifle.' },
        { id: 'head_shoulders', cat: 'Base Game', name: 'Head/Shoulders/Knees/Toes', rank: 'silver', current: 0, goal: 3, type: 'numeric', desc: 'Harvest from standing, kneeling, and prone positions.' }
    ];

    const state = {
        active: 'Werewolf3788',
        viewData: [], 
        fullCloudData: [], 
        ranks: { bronze: 0, silver: 0, gold: 0, diamond: 0, greatone: 0 },
        
        init: function() { 
            auth.signInAnonymously().then(() => this.load(this.active));
            this.bindEvents();
        },

        load: function(name) {
            this.active = name;
            document.getElementById('hunter-name').innerText = name;
            document.getElementById('wp-custom-wrapper').className = `theme-${name === 'Werewolf3788' ? 'werewolf' : name === 'Raymystyro' ? 'ray' : 'tj'}`;
            
            db.collection('artifacts').doc(MASTER_ID).collection('public').doc('data').collection('userTrophies').doc(name).onSnapshot(snap => {
                if (snap && snap.exists) { 
                    this.fullCloudData = snap.data().trophies || [];
                    this.viewData = JSON.parse(JSON.stringify(baseRegistryTemplate)).map(d => {
                        const f = this.fullCloudData.find(c => c.id === d.id);
                        if(f) { d.current = f.current; if(d.subItems && f.subItems) d.subItems = f.subItems; }
                        return d;
                    });
                    this.render();
                }
            });

            db.collection('artifacts').doc(LEGACY_ID).collection('public').doc('data').collection('userTrophies').doc(name).onSnapshot(snap => {
                if (snap && snap.exists) { this.ranks = snap.data(); this.updateRankUI(); }
            });
        },

        updateRankUI: function() {
            Object.keys(this.ranks).forEach(t => { 
                const el = document.getElementById(`rank-val-${t}`);
                if(el) el.innerText = this.ranks[t] || 0;
            });
        },

        bindEvents: function() {
            document.addEventListener('click', e => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                const act = btn.getAttribute('data-action');
                if (act === 'switch') this.load(btn.getAttribute('data-hunter'));
                if (act === 'rank') this.adjRank(btn.getAttribute('data-tier'), parseInt(btn.getAttribute('data-delta')));
                if (act === 'adj') this.adj(parseInt(btn.getAttribute('data-idx')), parseFloat(btn.getAttribute('data-delta')));
                if (act === 'tog') this.tog(parseInt(btn.getAttribute('data-idx')));
                if (act === 'open-modal') this.openModal(parseInt(btn.getAttribute('data-idx')));
                if (act === 'sub') this.sub(parseInt(btn.getAttribute('data-idx')), parseInt(btn.getAttribute('data-si')));
                if (act === 'close-modal') this.closeModal();
            });
        },

        adjRank: async function(t, d) {
            this.ranks[t] = Math.max(0, (this.ranks[t]||0) + d);
            await db.collection('artifacts').doc(LEGACY_ID).collection('public').doc('data').collection('userTrophies').doc(this.active).set(this.ranks, {merge:true});
        },

        adj: function(i, d) {
            this.viewData[i].current = Math.max(0, Math.min(this.viewData[i].goal, parseFloat((this.viewData[i].current + d).toFixed(2))));
            this.sync();
        },

        tog: function(i) {
            this.viewData[i].current = this.viewData[i].current >= this.viewData[i].goal ? 0 : this.viewData[i].goal;
            this.sync();
        },

        sub: function(i, si) {
            this.viewData[i].subItems[si].done = !this.viewData[i].subItems[si].done;
            this.viewData[i].current = this.viewData[i].subItems.filter(s => s.done).length;
            this.openModal(i); // Refresh modal view
            this.sync();
        },

        sync: async function() {
            const updatedRegistry = this.fullCloudData.map(cloudItem => {
                const localUpdate = this.viewData.find(v => v.id === cloudItem.id);
                return localUpdate ? localUpdate : cloudItem;
            });
            const finalData = updatedRegistry.length > 0 ? updatedRegistry : this.viewData;
            await db.collection('artifacts').doc(MASTER_ID).collection('public').doc('data').collection('userTrophies').doc(this.active).set({ trophies: finalData }, {merge:true});
        },

        openModal: function(idx) {
            const t = this.viewData[idx];
            document.getElementById('modal-content').innerHTML = `
                <h2 class="text-xl font-black uppercase text-orange-500 mb-2">${t.name}</h2>
                <p class="text-[10px] opacity-60 mb-6 italic">${t.desc}</p>
                ${t.subItems.map((s, si) => `
                    <div class="sub-item">
                        <span>${s.name}</span>
                        <button class="check-btn ${s.done ? 'done' : ''}" data-action="sub" data-idx="${idx}" data-si="${si}">${s.done ? '✓' : ''}</button>
                    </div>
                `).join('')}
            `;
            document.getElementById('mission-modal-overlay').style.display = 'flex';
        },

        closeModal: function() { document.getElementById('mission-modal-overlay').style.display = 'none'; },

        getIcon: function(t) {
            const n = t.name.toLowerCase();
            if (n.includes('marksman')) return ICONS.MARKSMAN;
            if (n === 'potty humor') return ICONS.POTTY;
            if (n.includes('arc') || n.includes('master')) return ICONS.ARC;
            if (n.includes('photo') || n.includes('paparazzi')) return ICONS.PHOTO;
            if (n.includes('mile') || n.includes('marathon')) return ICONS.TRAVEL;
            if (n.includes('track') || n.includes('stalker')) return ICONS.TRACK;
            return ICONS.GAME;
        },

        render: function() {
            const container = document.getElementById('section-container');
            container.innerHTML = '';
            
            const totalDenominator = 115;
            const globalMetCount = this.fullCloudData.filter(t => t.current >= t.goal).length;
            const globalPercent = Math.round((globalMetCount / totalDenominator) * 100);

            document.getElementById('percent-text').innerText = `Global Master Progress ${globalPercent}%`;
            document.getElementById('overall-bar').style.width = globalPercent + '%';
            document.getElementById('stat-line').innerText = `Sync: ${globalMetCount} / 115 Master Registry Points`;

            const section = document.createElement('div');
            section.innerHTML = `
                <div class="category-header">
                    <div><h2 class="category-title text-white">Base Game</h2><span class="text-[9px] jd-yellow-text font-bold uppercase">${this.viewData.filter(t=>t.current>=t.goal).length}/49 Synchronized</span></div>
                </div>
                <div class="trophy-grid pt-2">
                    ${this.viewData.map((t, gidx) => {
                        const done = t.current >= t.goal;
                        const cardPct = Math.round((t.current / t.goal) * 100);
                        return `
                            <div class="trophy-card ${done ? 'completed' : ''}">
                                <div class="flex justify-between items-start">
                                    <div class="flex items-center gap-3">
                                        <img src="${this.getIcon(t)}" class="w-10 h-10 rounded-lg">
                                        <span class="trophy-rank-badge rank-${t.rank}">${t.rank}</span>
                                    </div>
                                    <span class="text-[11px] font-black italic jd-yellow-text">${cardPct}%</span>
                                </div>
                                <h3>${t.name}</h3>
                                <p class="trophy-desc">${t.desc}</p>
                                <div class="mt-auto">
                                    ${t.type === 'numeric' ? `
                                        <div class="flex items-center justify-between bg-black/40 p-2 rounded-xl border border-white/10">
                                            <button class="w-8 h-8 bg-white/5 rounded" data-action="adj" data-idx="${gidx}" data-delta="-1">-</button>
                                            <span class="text-[11px] font-black">${t.current}/${t.goal}</span>
                                            <button class="w-8 h-8 bg-white/5 rounded" data-action="adj" data-idx="${gidx}" data-delta="1">+</button>
                                        </div>
                                    ` : t.type === 'checklist' ? `
                                        <button class="checklist-trigger" data-action="open-modal" data-idx="${gidx}">Audit Details (${t.current}/${t.goal})</button>
                                    ` : `<button class="toggle-btn" data-action="tog" data-idx="${gidx}">${done?'DONE':'MARK DONE'}</button>`}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            container.appendChild(section);
        }
    };
    state.init();
})();
</script>
</body>
</html>
