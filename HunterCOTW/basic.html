            display: flex; align-items: center; justify-content: center; transition: 0.2s; touch-action: manipulation;
        }

        .main-header { background: rgba(2, 6, 23, 0.85); padding: 35px 20px; border-radius: 2rem; border: 3px solid var(--hunter-color); box-shadow: 0 0 50px var(--hunter-glow); text-align: center; margin-bottom: var(--divi-row); }

        .category-arrow { transition: transform 0.3s ease; }

            display: grid; 
            grid-template-columns: 1fr;
            gap: 15px;

        { id: 'yukon_photo', cat: 'Yukon Valley', name: 'Grizzly Snapshot', rank: 'silver', current: 0, goal: 1, type: 'toggle', desc: 'Photograph a Grizzly within 25m.' },
        { id: 'wolf_harvest', cat: 'Yukon Valley', name: 'Gray Wolf Harvest', rank: 'bronze', current: 0, goal: 1, type: 'toggle', desc: 'Harvest a Gray Wolf.' },
        { id: 'yukon_ultra', cat: 'Yukon Valley', name: 'Yukon Voyager', rank: 'silver', current: 0, goal: 50, type: 'numeric', desc: 'Travel 50km on foot in Yukon.' },

        // VURHONGA SAVANNA
        { id: 'vurhonga_master', cat: 'Vurhonga Savanna', name: 'Savanna Master', rank: 'gold', current: 0, goal: 5, type: 'checklist', desc: "Complete Vurhonga mission arc.", subItems: checkSet(["Welcome", "Apex Hunter", "Protecting Herd", "Lion King", "Legacy"]) },
        { id: 'lion_heart', cat: 'Vurhonga Savanna', name: 'Lion Hearted', rank: 'silver', current: 0, goal: 1, type: 'toggle', desc: 'Harvest a male Lion.' },
        { id: 'buffalo_bill', cat: 'Vurhonga Savanna', name: 'Buffalo Stance', rank: 'bronze', current: 0, goal: 1, type: 'toggle', desc: 'Harvest a Cape Buffalo.' },

        // PARQUE FERNANDO
        { id: 'parque_master', cat: 'Parque Fernando', name: 'Parque Master', rank: 'gold', current: 0, goal: 5, type: 'checklist', desc: "Complete Parque mission arc.", subItems: checkSet(["The Challenge", "Red Stag", "Puma Hunt", "Diamond Buffalo", "Final Call"]) },
        { id: 'parque_photo', cat: 'Parque Fernando', name: 'Puma Shadow', rank: 'silver', current: 0, goal: 1, type: 'toggle', desc: 'Photograph a Puma.' },

        // MEDVED-TAIGA
        { id: 'medved_master', cat: 'Medved-Taiga', name: 'Medved Master', rank: 'gold', current: 0, goal: 5, type: 'checklist', desc: "Complete Medved mission arc.", subItems: checkSet(["Siberian Welcome", "Ghost Hunter", "The Ritual", "Ancient Tracks", "The End"]) },
        { id: 'taiga_travel', cat: 'Medved-Taiga', name: 'Frost Walker', rank: 'bronze', current: 0, goal: 20, type: 'numeric', desc: 'Travel 20km on foot in Taiga.' },

        // CUATRO COLINAS
        { id: 'cuatro_master', cat: 'Cuatro Colinas', name: 'Cuatro Master', rank: 'gold', current: 0, goal: 5, type: 'checklist', desc: "Complete Cuatro mission arc.", subItems: checkSet(["The Grand Tour", "Iberian Wolf", "Mouflon Tracking", "Royal Hunt", "Closing"]) },
        { id: 'colina_voyage', cat: 'Cuatro Colinas', name: 'Iberian Voyager', rank: 'bronze', current: 0, goal: 1, type: 'toggle', desc: 'Visit all outposts in Cuatro Colinas.' }
    ];

    const state = {
        active: 'Werewolf3788',
        viewData: [], 
        ranks: { bronze: 0, silver: 0, gold: 0, diamond: 0, greatone: 0 },
        unsub: null,
        unsubRanks: null,
        collapsed: { 'Base Game': true, 'Yukon Valley': true, 'Vurhonga Savanna': true, 'Parque Fernando': true, 'Medved-Taiga': true, 'Cuatro Colinas': true },
        
        init: function() { 
            auth.signInAnonymously().then(() => this.load(this.active));
            this.bindEvents();
        },

        load: function(name) {
            if (this.unsub) this.unsub();
            if (this.unsubRanks) this.unsubRanks();

            this.active = name;
            document.getElementById('hunter-name').innerText = name;
            document.getElementById('wp-custom-wrapper').className = `theme-${name === 'Werewolf3788' ? 'werewolf' : name === 'Raymystyro' ? 'ray' : 'tj'}`;
            
            document.querySelectorAll('.profile-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-hunter') === name);
            });

            this.unsub = db.collection('artifacts').doc(MASTER_ID).collection('public').doc('data').collection('userTrophies').doc(name).onSnapshot(snap => {
                let cloudTrophies = [];
                if (snap && snap.exists) { cloudTrophies = snap.data().trophies || []; }
                
                this.viewData = JSON.parse(JSON.stringify(baseRegistryTemplate)).map(d => {
                    const f = cloudTrophies.find(c => c.id === d.id);
                    if(f) { d.current = f.current; if(d.subItems && f.subItems) d.subItems = f.subItems; }
                    return d;
                });
                this.render();
            });

            this.unsubRanks = db.collection('artifacts').doc(LEGACY_ID).collection('public').doc('data').collection('userTrophies').doc(name).onSnapshot(snap => {
                if (snap && snap.exists) { this.ranks = snap.data(); } 
                else { this.ranks = { bronze: 0, silver: 0, gold: 0, diamond: 0, greatone: 0 }; }
                this.updateRankUI();
            });
        },

        updateRankUI: function() {
            Object.keys(this.ranks).forEach(t => { 
                const el = document.getElementById(`rank-val-${t}`);
                if(el) el.innerText = this.ranks[t] || 0;
            });
        },

        bindEvents: function() {
            document.addEventListener('click', e => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                const act = btn.getAttribute('data-action');
                if (act === 'switch') this.load(btn.getAttribute('data-hunter'));
                if (act === 'rank') this.adjRank(btn.getAttribute('data-tier'), parseInt(btn.getAttribute('data-delta')));
                if (act === 'adj') this.adj(parseInt(btn.getAttribute('data-idx')), parseFloat(btn.getAttribute('data-delta')));
                if (act === 'tog') this.tog(parseInt(btn.getAttribute('data-idx')));
                if (act === 'open-modal') this.openModal(parseInt(btn.getAttribute('data-idx')));
                if (act === 'sub') this.sub(parseInt(btn.getAttribute('data-idx')), parseInt(btn.getAttribute('data-si')));
                if (act === 'close-modal') this.closeModal();
                if (act === 'toggle-section') {
                    const cat = btn.getAttribute('data-cat');
                    this.collapsed[cat] = !this.collapsed[cat];
                    this.render();
                }
            });
        },

        adjRank: async function(t, d) {
            this.ranks[t] = Math.max(0, (this.ranks[t]||0) + d);
            await db.collection('artifacts').doc(LEGACY_ID).collection('public').doc('data').collection('userTrophies').doc(this.active).set(this.ranks, {merge:true});
        },

        adj: function(i, d) {
            this.viewData[i].current = Math.max(0, Math.min(this.viewData[i].goal, parseFloat((this.viewData[i].current + d).toFixed(2))));
            this.sync();
        },

        tog: function(i) {
            this.viewData[i].current = this.viewData[i].current >= this.viewData[i].goal ? 0 : this.viewData[i].goal;
            this.sync();
        },

        sub: function(i, si) {
            this.viewData[i].subItems[si].done = !this.viewData[i].subItems[si].done;
            this.viewData[i].current = this.viewData[i].subItems.filter(s => s.done).length;
            this.openModal(i);
            this.sync();
        },

        sync: async function() {
            await db.collection('artifacts').doc(MASTER_ID).collection('public').doc('data').collection('userTrophies').doc(this.active).set({ trophies: this.viewData }, {merge:true});
        },

        openModal: function(idx) {
            const t = this.viewData[idx];
            document.getElementById('modal-content').innerHTML = `
                <h2 class="text-xl font-black uppercase text-orange-500 mb-2">${t.name}</h2>
                <p class="text-[10px] opacity-60 mb-6 italic">${t.desc}</p>
                ${t.subItems.map((s, si) => `
                    <div class="sub-item">
                        <span>${s.name}</span>
                        <button class="check-btn ${s.done ? 'done' : ''}" data-action="sub" data-idx="${idx}" data-si="${si}">${s.done ? '✓' : ''}</button>
                    </div>
                `).join('')}
            `;
            document.getElementById('mission-modal-overlay').style.display = 'flex';
        },

        closeModal: function() { document.getElementById('mission-modal-overlay').style.display = 'none'; },

        render: function() {
            const container = document.getElementById('section-container');
            container.innerHTML = '';
            
            const totalDenominator = this.viewData.length;
            const globalMetCount = this.viewData.filter(t => t.current >= t.goal).length;
            const globalPercent = Math.round((globalMetCount / totalDenominator) * 100) || 0;

            document.getElementById('percent-text').innerText = `Global Master Progress ${globalPercent}%`;
            document.getElementById('overall-bar').style.width = globalPercent + '%';
            document.getElementById('stat-line').innerText = `Sync: ${globalMetCount} / ${totalDenominator} Master Registry Points`;

            const categories = [...new Set(this.viewData.map(t => t.cat))];
            
            categories.forEach(cat => {
                const items = this.viewData.filter(t => t.cat === cat);
                const isCollapsed = this.collapsed[cat];
                const metInCat = items.filter(t => t.current >= t.goal).length;

                const section = document.createElement('div');
                section.className = `category-section ${isCollapsed ? 'section-collapsed' : ''} mb-6`;
                section.innerHTML = `
                    <div class="category-header" data-action="toggle-section" data-cat="${cat}">
                        <div>
                            <h2 class="category-title text-white">${cat}</h2>
                            <span class="text-[9px] jd-yellow-text font-bold uppercase">${metInCat}/${items.length} Synchronized</span>
                        </div>
                        <span class="category-arrow text-xs jd-yellow-text">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="trophy-grid pt-2">
                            ${items.map(t => {
                                const gidx = this.viewData.indexOf(t);
                                const done = t.current >= t.goal;
                                const cardPct = Math.round((t.current / t.goal) * 100);
                                return `
                                    <div class="trophy-card ${done ? 'completed' : ''}">
                                        <div class="flex justify-between items-start">
                                            <span class="trophy-rank-badge rank-${t.rank}">${t.rank}</span>
                                            <span class="text-[11px] font-black italic jd-yellow-text">${cardPct}%</span>
                                        </div>
                                        <h3>${t.name}</h3>
                                        <p class="trophy-desc">${t.desc}</p>
                                        <div class="mt-auto">
                                            ${t.type === 'numeric' ? `
                                                <div class="flex items-center justify-between bg-black/40 p-2 rounded-xl border border-white/10">
                                                    <button class="w-8 h-8 bg-white/5 rounded" data-action="adj" data-idx="${gidx}" data-delta="-1">-</button>
                                                    <span class="text-[11px] font-black">${t.current}/${t.goal}</span>
                                                    <button class="w-8 h-8 bg-white/5 rounded" data-action="adj" data-idx="${gidx}" data-delta="1">+</button>
                                                </div>
                                            ` : t.type === 'checklist' ? `
                                                <button class="checklist-trigger" data-action="open-modal" data-idx="${gidx}">Audit Details (${t.current}/${t.goal})</button>
                                            ` : `<button class="toggle-btn" data-action="tog" data-idx="${gidx}">${done?'DONE':'MARK DONE'}</button>`}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
        }
    };
    state.init();
})();
</script>
</body>
</html>
