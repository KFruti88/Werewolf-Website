<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FS25 Master Tracker | Elite Sync</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Using confirmed working Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* Personalized Divi Mobile Settings: 50/30/14/30 */
            --divi-section-height: 50px;
            --divi-row-height: 30px;
            --divi-body-size: 14px;
            --divi-header-size: 30px;
            --os-nav-h: 60px;

            --jd-green: #367c2b;
            --jd-yellow: #ffde00;
            --fs25-theme: #367c2b;
            --glass-sheen: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            min-height: 100vh;
            color: #f1f5f9;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            font-size: var(--divi-body-size);
        }

        /* Adjusted for Global Menu clearance */
        #wp-custom-wrapper {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding-top: calc(var(--os-nav-h) + 20px);
            padding-left: 1rem;
            padding-right: 1rem;
            padding-bottom: var(--divi-section-height);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fs25-main-shell {
            width: 100%;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: url('https://i.psnprofiles.com/games/c94068/L843e83.png') no-repeat center center fixed;
            background-size: cover;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9);
            z-index: 2;
            padding: 2rem;
        }

        .fs25-main-shell::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.96) 100%);
            z-index: 1;
        }

        .fs-heavy-glass {
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.2rem;
            position: relative;
            z-index: 10;
        }

        .jd-yellow-text { color: var(--jd-yellow) !important; }
        .hw-accent-text { color: var(--fs25-theme) !important; text-shadow: 0 0 20px var(--fs25-theme); }

        .category-header { 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; border-left: 10px solid var(--fs25-theme); 
            padding: 1.25rem 1.75rem; background: rgba(15, 23, 42, 0.9);
            border-radius: 1rem; margin-bottom: 10px;
            position: relative; z-index: 20;
            transition: all 0.3s;
            user-select: none;
        }

        .section-collapsed .section-content { display: none; }
        .category-arrow { transition: transform 0.3s ease; }
        .section-collapsed .category-arrow { transform: rotate(-90deg); }

        .fs-card-glass {
            background: rgba(15, 18, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .fs-card-glass.earned {
            border-color: #22c55e !important;
            box-shadow: 0 0 30px -5px rgba(34, 197, 94, 0.4);
            background: rgba(15, 25, 20, 0.98) !important;
        }

        .fs-btn {
            cursor: pointer !important;
            pointer-events: auto !important;
            position: relative;
            z-index: 50;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .fs-btn:active { transform: scale(0.92); filter: brightness(1.2); }

        .op-btn-active {
            box-shadow: 0 0 20px var(--fs25-theme);
            border-color: var(--fs25-theme) !important;
            background: rgba(255, 255, 255, 0.1) !important;
        }

        @media (max-width: 768px) {
            #wp-custom-wrapper { padding: 10px 0.5rem; padding-top: calc(var(--os-nav-h) + 10px); }
            .fs25-main-shell { padding: 1.5rem 1rem; border-radius: 1.5rem; width: 100%; }
            .grid-mobile-2 { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 0.75rem !important; }
            h1 { font-size: var(--divi-header-size) !important; }
        }
    </style>
</head>
<body>

<!-- GLOBAL MENU PLACEHOLDER -->
<div id="nav-placeholder"></div>

<div id="wp-custom-wrapper">
    <div id="fs25-app-container" class="fs25-main-shell">
        
        <header class="text-center mb-12 relative z-[1000] mt-4">
            <h1 class="italic uppercase font-black tracking-tighter text-4xl md:text-7xl" style="color: var(--fs25-theme)">FS25</h1>
            <span class="text-[10px] font-black uppercase tracking-[0.6em] jd-yellow-text block mt-2 opacity-50">Squad Master Protocol</span>
        </header>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-[1000] mb-12">
            <div class="fs-heavy-glass p-6 flex flex-col items-center">
                <span class="text-[9px] font-black uppercase tracking-[0.4em] jd-yellow-text mb-4">Operator Sync</span>
                <div id="fs25-user-selector" class="flex flex-wrap justify-center gap-3"></div>
            </div>
            <div class="fs-heavy-glass p-6 flex flex-col items-center">
                <span class="text-[9px] font-black uppercase tracking-[0.4em] jd-yellow-text mb-4">Hardware Profile</span>
                <div id="fs25-platform-selector" class="flex flex-wrap justify-center gap-3"></div>
            </div>
        </div>

        <div id="fs25-platinum-root" class="relative z-10 mb-8"></div>
        <div id="fs25-section-container" class="relative z-10 flex flex-col gap-4"></div>

        <footer class="mt-24 text-center border-t border-white/5 pt-12 text-[10px] text-white/20 uppercase tracking-[0.8em] font-black">
            Lead Developer: Werewolf3788 • FS25 Ultimate Protocol v9.7
        </footer>
    </div>
</div>

<script type="module">
(function() {
    // 1. GLOBAL MENU INJECTOR (Sandbox Proof)
    (function injectNav() {
        const menuFile = 'GlobalMenu.html';
        fetch(menuFile)
            .then(res => res.ok ? res.text() : Promise.reject())
            .then(data => { document.getElementById('nav-placeholder').innerHTML = data; })
            .catch(() => {
                document.getElementById('nav-placeholder').innerHTML = `<div style="height:60px; background:#000; border-bottom:1px solid #333; position:fixed; top:0; width:100%; z-index:999999; display:flex; align-items:center; padding:0 24px; font-weight:900; color:#ffde00;">WEREWOLF.OS</div>`;
            });
    })();

    const firebaseConfig = {
        apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k",
        authDomain: "angler-squad-tracker.firebaseapp.com",
        projectId: "angler-squad-tracker",
        storageBucket: "angler-squad-tracker.firebasestorage.app",
        messagingSenderId: "325679067980",
        appId: "1:325679067980:web:57edbad70fe12b988355e9"
    };

    const appId = 'fs25-master';
    const fsAppName = 'FS25_CORE_SYNC';
    const app = !firebase.apps.some(a => a.name === fsAppName) ? firebase.initializeApp(firebaseConfig, fsAppName) : firebase.app(fsAppName);
    const db = app.firestore();
    const auth = app.auth();

    const SQUAD = [
        { id: 'Werewolf3788', label: 'Werewolf', theme: '#ff8c00', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/1a4efdb4-023e-4802-b07c-82c09a45c4c8-profile_image-70x70.png' },
        { id: 'Raymystyro', label: 'Ray', theme: '#c00000', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/032a0367-589f-4763-94de-4fc679a0b2df-profile_image-70x70.png' },
        { id: 'henchman37@gmail.com', label: 'TJ', theme: '#8a2be2', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/9dad426e-04cb-4fc0-a917-25982b3800ce-profile_image-70x70.png' }
    ];

    const MANIFEST = [
        { id: "fluffiness", title: "Fluffiness", goal: 30, isInc: true, rarity: "Rare", cat: "Animals", desc: "Breed 30 sheep." },
        { id: "piggies", title: "Three little piggies…", goal: 50, isInc: true, rarity: "Rare", cat: "Animals", desc: "Breed 50 pigs." },
        { id: "clucky_streak", title: "Clucky Streak", goal: 100, isInc: true, rarity: "Uncommon", cat: "Animals", desc: "Breed 100 chickens." },
        { id: "honey", title: "Bringing in the Honey", goal: 15, isInc: true, rarity: "Uncommon", cat: "Animals", desc: "Have a total of 15 beehives." },
        { id: "cowherd", title: "Cowherd", goal: 20, isInc: true, rarity: "Rare", cat: "Animals", desc: "Breed 20 cows." },
        { id: "allez_hopp", title: "Allez hopp", rarity: "Uncommon", cat: "Animals", desc: "Jump once while riding a horse." },
        { id: "not_a_kangaroo", title: "You are not a kangaroo", goal: 500, isInc: true, rarity: "Rare", cat: "Animals", desc: "Jump 500 times while riding a horse." },
        { id: "giddy_up", title: "Giddy-up!", rarity: "Uncommon", cat: "Animals", desc: "Fill the riding progress bar." },
        { id: "thoroughbred", title: "Thoroughbred!", goal: 50, isInc: true, rarity: "Rare", cat: "Animals", desc: "Ride a horse for 50 km." },
        { id: "ultimutt", title: "Ultimutt Pawesomeness", rarity: "Uncommon", cat: "Animals", desc: "Pet your dog for the first time." },
        { id: "rusty", title: "Rusty", goal: 25, isInc: true, rarity: "Rare", cat: "Toys & Collectibles", desc: "Find all 25 pieces of the Grain Elevator Museum." },
        { id: "over_9000", title: "Over 9000!", rarity: "Rare", cat: "Toys & Collectibles", desc: "Find all farm balls on the Hutan Pantai map." },
        { id: "tutti_frutti", title: "Tutti-Frutti", goal: 50, isInc: true, rarity: "Rare", cat: "Toys & Collectibles", desc: "Find all 50 golden apples on Zielonka map." },
        { id: "vehicle_fleet", title: "Vehicle fleet", goal: 60, isInc: true, rarity: "Uncommon", cat: "Farm Equipment", desc: "Own 60 vehicles." },
        { id: "fix_me_up", title: "Fix me up", goal: 25, isInc: true, rarity: "Uncommon", cat: "Farm Equipment", desc: "Repair 25 vehicles." },
        { id: "switch_it_up", title: "I like to switch it up", goal: 15, isInc: true, rarity: "Uncommon", cat: "Farm Equipment", desc: "Own 15 drivable vehicles." },
        { id: "beginning", title: "It's just the beginning", goal: 10, isInc: true, rarity: "Common", cat: "Farm Equipment", desc: "Play for 10 hours." },
        { id: "road_trip", title: "Road Trip", goal: 100, isInc: true, rarity: "Rare", cat: "Farming Operations", desc: "Drive 100km in a recreational vehicle." },
        { id: "helper_a", title: "Helper A", goal: 50, isInc: true, rarity: "Uncommon", cat: "Farming Operations", desc: "Complete 50 contracts." },
        { id: "hard_work", title: "Hard work pays off", goal: 10000000, isInc: true, rarity: "Uncommon", cat: "Farming Operations", desc: "Reach €10,000,000." },
        { id: "sow_easy", title: "It's sow easy", goal: 100, isInc: true, rarity: "Rare", cat: "Farming Operations", desc: "Sow 100 hectares in total." },
        { id: "large_supplier", title: "Large-scale supplier", goal: 100, isInc: true, rarity: "Uncommon", cat: "Farming Operations", desc: "Harvest 100 hectares in total." },
        { id: "cultivated", title: "Highly cultivated", goal: 100, isInc: true, rarity: "Rare", cat: "Farming Operations", desc: "Cultivate 100 hectares of land in total." },
        { id: "original_grain", title: "Original grain", goal: 500000, isInc: true, rarity: "Rare", cat: "Farming Operations", desc: "Sell 500,000 liters of sorghum." }
    ];

    let state = { currentSel: SQUAD[0], currentPlatform: 'PS5', userData: {}, collapsed: {} };

    window.switchFsUser = (id) => { state.currentSel = SQUAD.find(u => u.id === id); initSync(); };
    window.setFsPlatform = (p) => { state.currentPlatform = p; renderShell(); renderAll(); };
    window.toggleFsSection = (sid) => { state.collapsed[sid] = !state.collapsed[sid]; renderAll(); };

    window.updFsTrophy = async (tid, delta) => {
        const t = MANIFEST.find(m => m.id === tid);
        const pData = state.userData[state.platform] || {};
        const cur = pData[tid] || { count: 0, isEarned: false };
        let step = (tid === 'hard_work') ? 100000 : 1;
        let newVal = t.goal ? Math.max(0, Math.min(t.goal, (cur.count || 0) + (delta * step))) : (cur.isEarned ? 0 : 1);
        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('userTrophies').doc(state.currentSel.id);
        const update = {}; update[state.currentPlatform] = {};
        update[state.currentPlatform][tid] = { count: newVal, isEarned: newVal >= (t.goal || 1) };
        await ref.set(update, { merge: true });
    };

    function initSync() {
        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('userTrophies').doc(state.currentSel.id);
        ref.onSnapshot(doc => { state.userData = doc.exists ? doc.data() : {}; renderShell(); renderAll(); });
    }

    function renderShell() {
        const root = document.getElementById('fs25-app-container');
        root.style.setProperty('--fs25-theme', state.currentSel.theme);
        document.getElementById('fs25-user-selector').innerHTML = SQUAD.map(u => `
            <button onclick="window.switchFsUser('${u.id}')" class="fs-btn flex items-center gap-3 p-1.5 pr-6 rounded-full border-2 transition-all ${state.currentSel.id === u.id ? 'op-btn-active' : 'border-transparent opacity-60'}" style="background: rgba(0,0,0,0.6)">
                <img src="${u.img}" class="w-9 h-9 rounded-full" />
                <span class="text-[11px] font-black uppercase text-white">${u.label}</span>
            </button>
        `).join('');

        document.getElementById('fs25-platform-selector').innerHTML = ['PS5', 'PS4'].map(p => `
            <button id="btn-${p}" onclick="window.setFsPlatform('${p}')" class="fs-btn px-10 py-3 rounded-xl border-2 font-black text-xs uppercase tracking-widest transition-all ${state.currentPlatform === p ? 'op-btn-active' : 'opacity-30 border-white'}">
                ${p}
            </button>
        `).join('');
    }

    function renderAll() {
        const container = document.getElementById('fs25-section-container');
        const pData = state.userData[state.currentPlatform] || {};
        const earned = MANIFEST.filter(m => pData[m.id]?.isEarned).length;
        const total = 46;
        const pct = Math.floor((earned / total) * 100);

        document.getElementById('fs25-platinum-root').innerHTML = `
            <div class="fs-heavy-glass p-8 md:p-12 flex flex-col md:flex-row gap-8 items-center border-l-8 transition-all" style="border-left-color: var(--fs25-theme)">
                <div class="flex-1 text-center md:text-left">
                    <span class="jd-yellow-text text-[11px] uppercase font-black tracking-[0.4em] mb-2 block">${state.currentSel.label}'s Registry</span>
                    <h2 class="text-4xl md:text-6xl font-black italic text-white uppercase leading-none">OBJECTIVES: ${earned} / ${total}</h2>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-6xl md:text-9xl font-black italic hw-accent-text transition-all">${pct}%</span>
                </div>
            </div>
        `;

        container.innerHTML = '';
        ["Animals", "Toys & Collectibles", "Farm Equipment", "Farming Operations"].forEach(cat => {
            const sid = 'sec-' + cat.replace(/[^a-zA-Z]/g, '');
            const items = MANIFEST.filter(m => m.cat === cat);
            const section = document.createElement('div');
            if (state.collapsed[sid] === undefined) state.collapsed[sid] = true;
            section.className = state.collapsed[sid] ? 'section-collapsed' : '';
            section.innerHTML = `
                <div class="category-header" onclick="window.toggleFsSection('${sid}')">
                    <div class="flex flex-col"><span class="text-base font-black italic uppercase text-white">${cat}</span></div>
                    <span class="category-arrow text-white/50">▼</span>
                </div>
                <div class="section-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pt-4 pb-12 grid-mobile-2">
                    ${items.map(t => {
                        const d = pData[t.id] || { count: 0, isEarned: false };
                        return `
                            <div class="fs-card-glass p-6 shadow-xl ${d.isEarned ? 'earned' : ''}">
                                <span class="text-[9px] font-black uppercase jd-yellow-text border border-white/10 px-3 py-1 rounded-full w-fit mb-4">${t.rarity}</span>
                                <h3 class="text-lg font-black italic uppercase text-white leading-tight mb-2">${t.title}</h3>
                                <p class="text-[11px] jd-yellow-text font-bold mb-4 line-clamp-3 opacity-80">${t.desc}</p>
                                <div class="mt-auto flex items-center gap-3">
                                    ${t.goal && t.goal > 1 ? `
                                        <button onclick="window.updFsTrophy('${t.id}', -1)" class="fs-btn w-10 h-10 rounded-xl bg-white/5 border border-white/10">-</button>
                                        <div class="flex-1 text-center font-black">${d.count.toLocaleString()}</div>
                                        <button onclick="window.updFsTrophy('${t.id}', 1)" class="fs-btn w-10 h-10 rounded-xl bg-white/5 border border-white/10">+</button>
                                    ` : `
                                        <button onclick="window.updFsTrophy('${t.id}', 1)" class="fs-btn w-full py-4 rounded-xl text-[10px] font-black uppercase" style="background: ${d.isEarned ? '#22c55e' : 'rgba(255,255,255,0.05)'}; color: ${d.isEarned ? '#000' : '#fff'}">${d.isEarned ? 'MASTERED' : 'COLLECT'}</button>
                                    `}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            container.appendChild(section);
        });
    }

    auth.signInAnonymously().then(() => initSync());
})();
</script>
</body>
</html>
