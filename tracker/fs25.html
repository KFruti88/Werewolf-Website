<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS25 Master Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Personalized Divi Mobile Settings */
            --divi-section-height: 50px;
            --divi-row-height: 30px;
            --divi-body-size: 14px;
            --divi-header-size: 30px;

            --jd-green: #367c2b;
            --jd-yellow: #ffde00;
            --fs25-gold: #ffd700;
        }

        #wp-custom-wrapper {
            background: #020617 !important;
            width: 100% !important;
            margin: 0 auto !important;
            color: #f1f5f9 !important;
            font-family: ui-sans-serif, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: var(--divi-section-height) 0;
            box-sizing: border-box;
        }

        .fs25-main-shell {
            width: 98%;
            max-width: 1600px;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: url('https://i.psnprofiles.com/games/c94068/L843e83.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 2;
            padding: 2rem;
        }

        .fs25-main-shell::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.96) 100%);
            z-index: 1;
        }

        .fs-heavy-glass {
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .jd-yellow-text { color: var(--jd-yellow) !important; }

        .category-header { 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; border-left: 10px solid var(--fs25-theme, #367c2b); 
            padding: 15px 25px; background: rgba(15, 23, 42, 0.9);
            border-radius: 1rem; transition: 0.3s; margin-bottom: 10px;
            position: relative; z-index: 20;
        }
        .category-header:hover { background: rgba(30, 41, 59, 0.95); }
        .section-collapsed .section-content { display: none; }
        .category-arrow { transition: transform 0.3s ease; }
        .section-collapsed .category-arrow { transform: rotate(-90deg); }

        .fs-card-glass {
            background: rgba(15, 18, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .fs-card-glass.earned {
            border-color: #22c55e !important;
            box-shadow: 0 0 30px -5px rgba(34, 197, 94, 0.4);
        }

        .op-btn-active {
            box-shadow: 0 0 25px var(--fs25-theme);
            border-color: var(--fs25-theme) !important;
            transform: scale(1.05);
        }

        .loading-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        @media (max-width: 768px) {
            .fs25-main-shell { border-radius: 0; padding: 1rem; width: 100%; }
            .grid-mobile-2 { display: grid !important; grid-template-columns: repeat(1, 1fr) !important; gap: 0.75rem !important; }
            body { font-size: var(--divi-body-size); }
            h1 { font-size: var(--divi-header-size) !important; }
            .section-spacer { margin-bottom: var(--divi-row-height); }
        }
    </style>
</head>
<body>

<div id="wp-custom-wrapper">
    <div id="fs25-app-container" class="fs25-main-shell">
        
        <header id="fs25-top-target" class="text-center mb-12 relative z-[1000] mt-4">
            <h1 class="italic uppercase font-black tracking-tighter text-4xl md:text-7xl" style="color: var(--fs25-theme)">FS25</h1>
            <span class="text-[10px] font-black uppercase tracking-[0.6em] jd-yellow-text block mt-2 opacity-50">Squad Master Protocol</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 section-spacer relative z-[1000] mb-12">
            <div class="fs-heavy-glass p-6 flex flex-col items-center">
                <span class="text-[9px] font-black uppercase tracking-[0.4em] jd-yellow-text mb-4">Operator Sync</span>
                <div id="fs25-user-selector" class="flex flex-wrap justify-center gap-3"></div>
            </div>
            <div class="fs-heavy-glass p-6 flex flex-col items-center">
                <span class="text-[9px] font-black uppercase tracking-[0.4em] jd-yellow-text mb-4">Hardware Profile</span>
                <div id="fs25-platform-selector" class="flex flex-wrap justify-center gap-3"></div>
            </div>
        </div>

        <div id="fs25-platinum-root" class="section-spacer relative z-10">
            <div class="fs-heavy-glass p-12 text-center loading-pulse">
                <span class="text-[10px] font-black uppercase tracking-[0.4em] jd-yellow-text">Initializing Registry Sections...</span>
            </div>
        </div>

        <div id="fs25-section-container" class="relative z-10 flex flex-col gap-4"></div>

        <footer class="mt-20 text-center border-t border-white/5 pt-8 pb-4 text-[9px] jd-yellow-text uppercase tracking-[0.5em] font-black">
            FS25 Ultimate Protocol • Lead: Werewolf3788
        </footer>
    </div>
</div>

<script type="module">

    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const config = {
        apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k",
        authDomain: "angler-squad-tracker.firebaseapp.com",
        projectId: "angler-squad-tracker",
        storageBucket: "angler-squad-tracker.firebasestorage.app",
        messagingSenderId: "325679067980",
        appId: "1:325679067980:web:57edbad70fe12b988355e9"

    const SQUAD = [
        { id: 'Werewolf3788', label: 'Werewolf', theme: '#ff8c00', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/1a4efdb4-023e-4802-b07c-82c09a45c4c8-profile_image-70x70.png' },
        { id: 'Raymystyro', label: 'Ray', theme: '#c00000', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/032a0367-589f-4763-94de-4fc679a0b2df-profile_image-70x70.png' },
        { id: 'terrdog420', label: 'TJ', theme: '#8a2be2', img: 'https://static-cdn.jtvnw.net/jtv_user_pictures/9dad426e-04cb-4fc0-a917-25982b3800ce-profile_image-70x70.png' }
    ];

    const PLATFORM_CONFIG = {
        'PS5': { color: '#004a99' },
        'Xbox': { color: '#107c10' },
        'PC': { color: '#ffcc00' },
        'Steam': { color: '#666666' }
    };

    const MANIFEST = [
        { id: "fluffiness", title: "Fluffiness", goal: 30, rarity: "Rare", cat: "Animals", desc: "Breed 30 sheep." },
        { id: "piggies", title: "Three little piggies…", goal: 50, rarity: "Rare", cat: "Animals", desc: "Breed 50 pigs." },
        { id: "clucky_streak", title: "Clucky Streak", goal: 100, rarity: "Uncommon", cat: "Animals", desc: "Breed 100 chickens." },
        { id: "honey", title: "Bringing in the Honey", goal: 15, rarity: "Uncommon", cat: "Animals", desc: "Have a total of 15 beehives." },
        { id: "cowherd", title: "Cowherd", goal: 20, rarity: "Rare", cat: "Animals", desc: "Breed 20 cows." },
        { id: "allez_hopp", title: "Allez hopp", goal: 1, rarity: "Uncommon", cat: "Animals", desc: "Jump once while riding a horse." },
        { id: "not_a_kangaroo", title: "You are not a kangaroo", goal: 500, rarity: "Rare", cat: "Animals", desc: "Jump 500 times while riding a horse." },
        { id: "giddy_up", title: "Giddy-up!", goal: 1, rarity: "Uncommon", cat: "Animals", desc: "Fill the riding progress bar." },
        { id: "thoroughbred", title: "Thoroughbred!", goal: 50, rarity: "Rare", cat: "Animals", desc: "Ride a horse for 50 km." },

        { id: "rusty", title: "Rusty", goal: 25, rarity: "Rare", cat: "Toys & Collectibles", desc: "Find all 25 pieces of the Grain Elevator Museum." },
        { id: "over_9000", title: "Over 9000!", goal: 1, rarity: "Rare", cat: "Toys & Collectibles", desc: "Find all farm balls on the Hutan Pantai map." },
        { id: "tutti_frutti", title: "Tutti-Frutti", goal: 50, rarity: "Rare", cat: "Toys & Collectibles", desc: "Find all 50 golden apples on Zielonka map." },
        { id: "vehicle_fleet", title: "Vehicle fleet", goal: 60, rarity: "Uncommon", cat: "Farm Equipment", desc: "Own 60 vehicles." },

        { id: "switch_it_up", title: "Switch it up", goal: 15, rarity: "Uncommon", cat: "Farm Equipment", desc: "Own 15 drivable vehicles." },
        { id: "weekend_vehicle", title: "Weekend vehicle", goal: 30, rarity: "Uncommon", cat: "Farm Equipment", desc: "Own 30 vehicles." },
        { id: "beginning", title: "Just the beginning", goal: 10, rarity: "Common", cat: "Farm Equipment", desc: "Play for 10 hours." },
        { id: "fell_off", title: "It just fell off", goal: 1, rarity: "Uncommon", cat: "Farm Equipment", desc: "Repair a vehicle." },
        { id: "van_gogh", title: "van Gogh", goal: 1, rarity: "Uncommon", cat: "Farm Equipment", desc: "Repaint one of your vehicles." },
        { id: "stumped", title: "I'm stumped", goal: 1, rarity: "Common", cat: "Farm Equipment", desc: "Cut down one tree." },
        { id: "road_trip", title: "Road Trip", goal: 100, rarity: "Rare", cat: "Farming Operations", desc: "Drive 100km in a recreational vehicle." },
        { id: "helper_a", title: "Helper A does not stop ... ever", goal: 50, rarity: "Uncommon", cat: "Farming Operations", desc: "Complete 50 contracts." },
        { id: "help_me", title: "Help me help you", goal: 1, rarity: "Common", cat: "Farming Operations", desc: "Complete one contract." },
        { id: "plant_get_enough", title: "Plant get enough", goal: 1, rarity: "Common", cat: "Farming Operations", desc: "Fertilize 1 hectare." },
        { id: "plot_thickens", title: "The plot thickens", goal: 100, rarity: "Uncommon", cat: "Farming Operations", desc: "Fertilize 100 hectares." },
        { id: "hard_work", title: "Hard work pays off", goal: 10000000, rarity: "Uncommon", cat: "Farming Operations", desc: "Reach €10,000,000." },
        { id: "never_late", title: "Never too late", goal: 1, rarity: "Uncommon", cat: "Farming Operations", desc: "Load a save file after 1 year." },
        { id: "sprinkle", title: "Just a sprinkle", goal: 1, rarity: "Common", cat: "Farming Operations", desc: "Sow 1 hectare." },
        { id: "sow_easy", title: "It's sow easy", goal: 100, rarity: "Rare", cat: "Farming Operations", desc: "Sow 100 hectares." },
        { id: "own_use", title: "Own use", goal: 1, rarity: "Common", cat: "Farming Operations", desc: "Harvest 1 hectare." },
        { id: "large_supplier", title: "Large-scale supplier", goal: 100, rarity: "Uncommon", cat: "Farming Operations", desc: "Harvest 100 hectares." },
        { id: "field_trip", title: "Field Trip", goal: 150, rarity: "Uncommon", cat: "Farming Operations", desc: "Drive 150 km in tractors." },
        { id: "long_haul", title: "Long haul", goal: 50, rarity: "Uncommon", cat: "Farming Operations", desc: "Drive 50 km in trucks." },
        { id: "shakespeare", title: "I read Shakespeare", goal: 1, rarity: "Common", cat: "Farming Operations", desc: "Cultivate 1 hectare." },
        { id: "cultivated", title: "Highly cultivated", goal: 100, rarity: "Rare", cat: "Farming Operations", desc: "Cultivate 100 hectares." },
        { id: "wrap", title: "That's a wrap", goal: 40, rarity: "Uncommon", cat: "Farming Operations", desc: "Wrap 40 bales of grass." },
        { id: "cotton", title: "Gone but not for cotton", goal: 40, rarity: "Rare", cat: "Farming Operations", desc: "Sell 40 cotton bales." },
        { id: "raisin", title: "Raisin the stakes", goal: 80000, rarity: "Rare", cat: "Farming Operations", desc: "Sell 80,000 liters of grapes." },
        { id: "olea", title: "Olea europaea", goal: 60000, rarity: "Rare", cat: "Farming Operations", desc: "Sell 60,000 liters of olives." },
        { id: "original_grain", title: "Original grain", goal: 500000, rarity: "Rare", cat: "Farming Operations", desc: "Sell 500,000 liters of sorghum." },
        { id: "rock_on", title: "Rock on", goal: 1, rarity: "Uncommon", cat: "Farming Operations", desc: "Sell stones." },
        { id: "wood_not", title: "Wood not believe it", goal: 25, rarity: "Uncommon", cat: "Farming Operations", desc: "Cut down 25 trees." },
        { id: "out_of_land", title: "All out of Land", goal: 20, rarity: "Uncommon", cat: "Farming Operations", desc: "Build 20 buildings." },
        { id: "well_oiled", title: "Well-Oiled Machine", goal: 10, rarity: "Uncommon", cat: "Farming Operations", desc: "Build 10 factories." }
    ];

    const state = {
        db: null,
        currentSel: SQUAD[0],
        currentPlatform: 'PS5',
        userData: {},
        collapsed: {},
        unsubscribe: null
    };

    async function init() {
        const appInstance = initializeApp(config);
        const auth = getAuth(appInstance);
        state.db = getFirestore(appInstance);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                renderShell();
                initSync();
            } else {
                await signInAnonymously(auth);
            }
        });
        bindActions();
    }

    function initSync() {
        if (state.unsubscribe) state.unsubscribe();
        
        const ref = doc(state.db, 'artifacts', 'fs25-master', 'public', 'data', 'userTrophies', state.currentSel.id);
        state.unsubscribe = onSnapshot(ref, (snap) => {
            state.userData = snap.exists() ? snap.data() : {};
            renderAll();
        }, (err) => console.error("Sync Error:", err));
    }

    function bindActions() {
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            
            const action = btn.getAttribute('data-action');
            
            if (action === 'switch') {
                state.currentSel = SQUAD.find(u => u.id === btn.getAttribute('data-user'));
                renderShell();
                initSync();
            }
            if (action === 'platform') {
                state.currentPlatform = btn.getAttribute('data-platform');
                renderShell();
                initSync();
            }
            if (action === 'toggle-sec') {
                const sid = btn.getAttribute('data-sid');
                state.collapsed[sid] = !state.collapsed[sid];
                renderAll();
            }
            if (action === 'trophy') {
                const tid = btn.getAttribute('data-id');
                const delta = parseInt(btn.getAttribute('data-delta'));
                updateTrophy(tid, delta);
            }
        });
    }

    async function updateTrophy(tid, delta) {
        const t = MANIFEST.find(m => m.id === tid);
        const pData = state.userData[state.currentPlatform] || {};
        const cur = pData[tid] || { count: 0, isEarned: false };
        
        let step = (tid === 'hard_work') ? 100000 : 1;
        if (tid.includes('liter') || tid === 'original_grain' || tid === 'raisin' || tid === 'olea') step = 5000;

        let newCount;
        if (t.goal > 1) {
            newCount = Math.max(0, Math.min(t.goal, (cur.count || 0) + (delta * step)));
        } else {
            newCount = (cur.isEarned && delta < 0) ? 0 : 1;
        }

        const isEarned = newCount >= t.goal;
        const ref = doc(state.db, 'artifacts', 'fs25-master', 'public', 'data', 'userTrophies', state.currentSel.id);
        
        try {
            await setDoc(ref, {
                [state.currentPlatform]: {
                    [tid]: { count: newCount, isEarned: isEarned }
                }
            }, { merge: true });
        } catch (e) {
            console.error("Save Error:", e);
        }
    }

    function renderShell() {
        const root = document.getElementById('fs25-app-container');
        root.style.setProperty('--fs25-theme', state.currentSel.theme);
        
        document.getElementById('fs25-user-selector').innerHTML = SQUAD.map(u => `
            <button data-action="switch" data-user="${u.id}" class="flex items-center gap-2 p-1 rounded-full border-2 transition-all ${state.currentSel.id === u.id ? 'op-btn-active' : ''}"
                style="border-color: transparent; background: rgba(0,0,0,0.6)">
                <img src="${u.img}" class="w-8 h-8 rounded-full border border-black/40" />
                <span class="text-[10px] font-black uppercase text-white/90 pr-3">${u.label}</span>
            </button>
        `).join('');

        document.getElementById('fs25-platform-selector').innerHTML = Object.keys(PLATFORM_CONFIG).map(p => `
            <button data-action="platform" data-platform="${p}" class="px-5 py-2 rounded-xl border-2 font-black text-[10px] uppercase tracking-widest transition-all
                ${state.currentPlatform === p ? 'border-white bg-white/20' : 'border-white/10 bg-black/40 text-white/40'}">
                ${p}
            </button>
        `).join('');
    }

    function renderAll() {
        const container = document.getElementById('fs25-section-container');
        const pData = state.userData[state.currentPlatform] || {};
        
        const earnedCount = MANIFEST.filter(m => pData[m.id]?.isEarned).length;
        const totalCount = 46;
        const allEarned = earnedCount >= 45;
        const displayEarned = allEarned ? 46 : earnedCount;
        const globalPct = Math.floor((displayEarned / totalCount) * 100);

        document.getElementById('fs25-platinum-root').innerHTML = `
            <div class="fs-heavy-glass p-8 md:p-12 flex flex-col md:flex-row gap-8 items-center border-t-8 shadow-2xl" style="border-top-color: ${allEarned ? '#22c55e' : 'var(--fs25-theme)'}">
                <div class="flex-1 text-center md:text-left">
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] mb-2 block jd-yellow-text">Master Operator: ${state.currentSel.label}</span>
                    <h2 class="text-3xl md:text-5xl font-black italic uppercase text-white">${allEarned ? 'Farming is our nature' : 'Master Registry: ' + displayEarned + '/' + totalCount}</h2>
                    ${allEarned ? '<p class="text-[10px] jd-yellow-text font-bold mt-2 uppercase tracking-widest">Platinum Trophy Synchronized</p>' : ''}
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-7xl md:text-8xl font-black italic" style="color: ${allEarned ? '#22c55e' : 'var(--fs25-theme)'}">${globalPct}%</span>
                    <span class="text-[8px] font-black uppercase tracking-[0.8em] jd-yellow-text">Synchronization</span>
                </div>
            </div>
        `;

        container.innerHTML = '';
        const categories = ["Animals", "Toys & Collectibles", "Farm Equipment", "Farming Operations"];
        
        categories.forEach(cat => {
            const items = MANIFEST.filter(m => m.cat === cat);
            const sid = 'sec-' + cat.replace(/\s/g, '');
            if (state.collapsed[sid] === undefined) state.collapsed[sid] = false;
            const isCollapsed = state.collapsed[sid];
            
            const metInCat = items.filter(m => pData[m.id]?.isEarned).length;
            const catPct = Math.round((metInCat / items.length) * 100) || 0;

            const section = document.createElement('div');
            section.className = `category-section ${isCollapsed ? 'section-collapsed' : ''}`;
            section.innerHTML = `
                <div class="category-header" data-action="toggle-sec" data-sid="${sid}">
                    <div class="flex flex-col">
                        <h2 class="category-title uppercase font-black italic tracking-wider text-sm text-white">${cat}</h2>
                        <span class="text-[8px] jd-yellow-text uppercase font-black tracking-widest">${metInCat}/${items.length} Synchronized</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-20 md:w-32 h-2 bg-black/50 rounded-full border border-white/10 overflow-hidden relative">
                            <div class="h-full bg-[var(--jd-yellow)] shadow-[0_0_10px_var(--jd-yellow)] transition-all duration-700" style="width: ${catPct}%"></div>
                        </div>
                        <span class="category-arrow text-xs jd-yellow-text">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pt-2 pb-8 grid-mobile-2">
                        ${items.map(t => {
                            const d = pData[t.id] || { count: 0, isEarned: false };
                            const cardPct = Math.floor((d.count / t.goal) * 100);
                            return `
                                <div class="fs-card-glass p-6 shadow-xl ${d.isEarned ? 'earned' : ''}">
                                    <div class="flex justify-between items-start mb-4">
                                         <span class="text-[8px] font-black uppercase tracking-widest jd-yellow-text border border-[var(--jd-yellow)]/20 px-3 py-1 rounded-full">${t.rarity}</span>
                                         <span class="text-xs font-black italic jd-yellow-text">${cardPct}%</span>
                                    </div>
                                    <h3 class="text-lg font-black italic uppercase text-white leading-tight mb-2">${t.title}</h3>
                                    <p class="text-[11px] jd-yellow-text font-bold mb-4 opacity-80">${t.desc}</p>
                                    <div class="mt-auto pt-4 flex items-center gap-3">
                                        ${t.goal > 1 ? `
                                            <button data-action="trophy" data-id="${t.id}" data-delta="-1" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center font-bold">-</button>
                                            <div class="flex-1 text-center">
                                                <span class="text-sm font-black" style="color: var(--fs25-theme)">${d.count.toLocaleString()}</span>
                                                <span class="jd-yellow-text text-[8px] block font-black uppercase">Goal ${t.goal.toLocaleString()}</span>
                                            </div>
                                            <button data-action="trophy" data-id="${t.id}" data-delta="1" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center font-bold">+</button>
                                        ` : `
                                            <button data-action="trophy" data-id="${t.id}" data-delta="${d.isEarned ? -1 : 1}" class="w-full py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all"
                                                style="background: ${d.isEarned ? '#22c55e' : 'rgba(255,255,255,0.05)'}; border: 1px solid ${d.isEarned ? '#22c55e' : 'rgba(255,255,255,0.1)'}; color: ${d.isEarned ? '#000' : 'var(--jd-yellow)'}">
                                                ${d.isEarned ? 'MASTERED' : 'SYNCHRONIZE'}
                                            </button>
                                        `}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            container.appendChild(section);
        });
    }
    init();
</script>
</body>
</html>
