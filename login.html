<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEREWOLF.OS | Multi-Auth Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Your Mobile Layout Protocol: 50/30/14/30 */
            --os-section-h: 50px;
            --os-row-h: 30px;
            --os-body-size: 14px;
            --os-header-size: 30px;
        }

        body {
            background-color: #000;
            color: #fafafa;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: var(--os-body-size);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--os-section-h) 0;
        }

        .login-glass {
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 40px 30px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header-text {
            font-size: var(--os-header-size);
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: var(--os-row-h);
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar for Auth Grid */
        .auth-grid::-webkit-scrollbar { width: 4px; }
        .auth-grid::-webkit-scrollbar-track { background: transparent; }
        .auth-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .login-btn {
            padding: 12px 20px;
            border-radius: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            flex-shrink: 0;
        }

        .login-btn:active { transform: scale(0.96); }

        /* Brand Colors */
        .btn-google { background: #fff; color: #000; }
        .btn-twitch { background: #9146ff; color: #fff; border-color: #a970ff; }
        .btn-apple { background: #000; color: #fff; border-color: #333; }
        .btn-facebook { background: #1877f2; color: #fff; border-color: #4267b2; }
        .btn-discord { background: #5865F2; color: #fff; border-color: #7289da; }
        .btn-xbox { background: #107C10; color: #fff; border-color: #1a9e1a; }
        .btn-playstation { background: #003087; color: #fff; border-color: #00439c; }

        .status-dot {
            width: 8px; height: 8px;
            background: #ffde00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ffde00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { 
            getAuth, 
            GoogleAuthProvider, 
            FacebookAuthProvider, 
            OAuthProvider, 
            signInWithPopup 
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        const firebaseConfig = { apiKey: "AIzaSyC55Cb3JcK9NiDkdSHpAS3UuTEG82aze7k", authDomain: "angler-squad-tracker.firebaseapp.com", projectId: "angler-squad-tracker", storageBucket: "angler-squad-tracker.firebasestorage.app", messagingSenderId: "325679067980", appId: "1:325679067980:web:57edbad70fe12b988355e9" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const appAuth = {
            signIn: async (providerName) => {
                let provider;
                const msg = document.getElementById('status-msg');
                msg.classList.add('hidden');

                try {
                    switch(providerName) {
                        case 'google':
                            provider = new GoogleAuthProvider();
                            break;
                        case 'facebook':
                            provider = new FacebookAuthProvider();
                            break;
                        case 'apple':
                            provider = new OAuthProvider('apple.com');
                            break;
                        case 'twitch':
                            provider = new OAuthProvider('oidc.twitch');
                            break;
                        case 'discord':
                            provider = new OAuthProvider('discord.com');
                            break;
                        case 'microsoft':
                            provider = new OAuthProvider('microsoft.com');
                            break;
                        case 'playstation':
                            provider = new OAuthProvider('oidc.playstation');
                            break;
                    }

                    const result = await signInWithPopup(auth, provider);
                    window.location.href = 'index.html';
                } catch (error) {
                    msg.innerText = "Auth Error: " + error.code;
                    msg.classList.remove('hidden');
                }
            }
        };
        window.appAuth = appAuth;
    </script>
